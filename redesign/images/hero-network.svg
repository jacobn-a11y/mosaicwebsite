<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a5bd7" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a5bd7" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity=".6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Soft background orbs -->
  <circle cx="200" cy="150" r="120" fill="#2a5bd7" opacity=".04" filter="url(#softGlow)"/>
  <circle cx="600" cy="300" r="140" fill="#2dd4bf" opacity=".04" filter="url(#softGlow)"/>
  <circle cx="400" cy="250" r="100" fill="#2a5bd7" opacity=".03" filter="url(#softGlow)"/>

  <!-- Network connections -->
  <g stroke="url(#g2)" stroke-width="1" opacity=".2">
    <line x1="120" y1="100" x2="280" y2="180"/>
    <line x1="280" y1="180" x2="420" y2="120"/>
    <line x1="420" y1="120" x2="560" y2="200"/>
    <line x1="560" y1="200" x2="680" y2="140"/>
    <line x1="280" y1="180" x2="350" y2="300"/>
    <line x1="350" y1="300" x2="500" y2="320"/>
    <line x1="500" y1="320" x2="560" y2="200"/>
    <line x1="120" y1="100" x2="200" y2="250"/>
    <line x1="200" y1="250" x2="350" y2="300"/>
    <line x1="500" y1="320" x2="650" y2="380"/>
    <line x1="680" y1="140" x2="720" y2="280"/>
    <line x1="720" y1="280" x2="650" y2="380"/>
    <line x1="350" y1="300" x2="280" y2="400"/>
    <line x1="280" y1="400" x2="430" y2="430"/>
    <line x1="430" y1="430" x2="500" y2="320"/>
    <line x1="430" y1="430" x2="580" y2="440"/>
    <line x1="580" y1="440" x2="650" y2="380"/>
  </g>

  <!-- Data flow paths (animated dashes) -->
  <g stroke="#2a5bd7" stroke-width="1.5" fill="none" opacity=".3">
    <path d="M120 100 L280 180 L420 120 L560 200" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M350 300 L500 320 L650 380" stroke="#2dd4bf" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Network nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="100" r="6" fill="#2a5bd7" opacity=".7"/>
    <circle cx="280" cy="180" r="8" fill="#2a5bd7" opacity=".8"/>
    <circle cx="420" cy="120" r="5" fill="#2dd4bf" opacity=".7"/>
    <circle cx="560" cy="200" r="7" fill="#2a5bd7" opacity=".7"/>
    <circle cx="680" cy="140" r="5" fill="#2dd4bf" opacity=".6"/>
    <circle cx="200" cy="250" r="4" fill="#6b9aff" opacity=".5"/>
    <circle cx="350" cy="300" r="7" fill="#2dd4bf" opacity=".7"/>
    <circle cx="500" cy="320" r="6" fill="#2a5bd7" opacity=".6"/>
    <circle cx="650" cy="380" r="5" fill="#2dd4bf" opacity=".6"/>
    <circle cx="720" cy="280" r="4" fill="#6b9aff" opacity=".5"/>
    <circle cx="280" cy="400" r="4" fill="#2a5bd7" opacity=".4"/>
    <circle cx="430" cy="430" r="5" fill="#2dd4bf" opacity=".5"/>
    <circle cx="580" cy="440" r="4" fill="#6b9aff" opacity=".4"/>
  </g>

  <!-- Pulse rings on key nodes -->
  <circle cx="280" cy="180" r="8" fill="none" stroke="#2a5bd7" stroke-width="1" opacity="0">
    <animate attributeName="r" from="8" to="24" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from=".4" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="300" r="7" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0">
    <animate attributeName="r" from="7" to="22" dur="3s" begin=".8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from=".4" to="0" dur="3s" begin=".8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="200" r="7" fill="none" stroke="#2a5bd7" stroke-width="1" opacity="0">
    <animate attributeName="r" from="7" to="20" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from=".3" to="0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Small floating particles -->
  <circle cx="160" cy="160" r="2" fill="#2a5bd7" opacity=".3">
    <animate attributeName="cy" from="160" to="140" dur="4s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" from=".3" to=".1" dur="4s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="460" cy="240" r="1.5" fill="#2dd4bf" opacity=".3">
    <animate attributeName="cy" from="240" to="220" dur="5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" from=".3" to=".1" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="620" cy="300" r="2" fill="#6b9aff" opacity=".2">
    <animate attributeName="cy" from="300" to="280" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" from=".2" to=".05" dur="3.5s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>
